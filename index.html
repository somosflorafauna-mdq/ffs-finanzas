<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d0620;color:#f3e8ff;min-height:100vh}
input,select,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
select option{background:#2a1050;color:#f3e8ff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.25);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.18s ease}
@media(min-width:768px){
  .app-sidebar{display:flex!important}
  .app-bottomnav{display:none!important}
  .app-main{padding:20px!important}
}
@media(min-width:1024px){
  .app-main{padding:24px 28px!important}
}
@media(max-width:767px){
  .app-sidebar{display:none!important}
  /* v4: body scroll nativo — elimina fixed-shell+overflow-div que causa ghosting */
  html{height:auto!important;overflow-x:hidden!important;}
  body{min-height:0!important;height:auto!important;overflow-x:hidden!important;overflow-y:auto!important;}
  .app-wrap{display:block!important;position:static!important;height:auto!important;overflow:visible!important;padding-bottom:68px;}
  .app-main{padding:8px 8px 12px!important;overflow:visible!important;height:auto!important;}
  .app-bottomnav{display:flex!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;z-index:100!important;padding-bottom:env(safe-area-inset-bottom,0px)!important;}
  .ffs-balance-amount{font-size:26px!important}
  .ffs-card-grid{grid-template-columns:1fr 1fr!important}
  .ffs-section-card{padding:12px!important}
  /* FIX GHOSTING ROOT CAUSE:
     will-change:transform en el header crea una GPU texture layer.
     Cuando un input date/select recibe focus en Android Chrome, el browser
     promueve el input a su propio compositor layer, lo que hace que el header
     GPU layer se "filtre" visualmente sobre el contenido scrolleado (ghosting).
     Solución: will-change:auto elimina la GPU layer del header en mobile.
     overflow:visible elimina el clipping context que amplifica el artifact. */
  .ffs-header-mobile{
    will-change:auto!important;
    overflow:visible!important;
    border-radius:16px!important;
  }
  /* rgba sólidos para los 3 elementos con rgba+borderRadius en "Agregar" */
  .ffs-monto-panel{background:#1e0e3f!important;border-color:#341868!important;}
  .ffs-monto-inner{border-bottom-color:#4a2391!important;}
}
</style>

async function supa(path, opts, token) {
  opts = opts || {};
  var t = token || (function() {
    try { return JSON.parse(localStorage.getItem("ffs_sess")).access_token; } catch(e) { return null; }
  })() || SKEY;
  var h = Object.assign({"Content-Type":"application/json","apikey":SKEY,"Authorization":"Bearer "+t}, opts.headers || {});
  var r = await fetch(SURL + path, Object.assign({}, opts, {headers: h}));
  if (!r.ok) {
    var e = await r.json().catch(function(){return {};});
    if (r.status === 401 || (r.status === 400 && e.message && e.message.includes('API key'))) {
      clearSess();
    }
    throw new Error(e.message || r.statusText);
  }
  if (r.status === 204) return null;
  return r.json();
}

async function supaAuth(path, body) {

  });

  if (d.error || d.error_description) throw new Error(d.error_description || (d.error && d.error.message) || d.msg || "Error");

}

function PieDonut({data, sym, priv}) {
  var total = data.reduce(function(s,d){return s+d.value;}, 0);
  var angle = -Math.PI/2;
  var slices = data.map(function(d) {
    var a = (d.value/total)*2*Math.PI;
    var x1 = 85+75*Math.cos(angle), y1 = 85+75*Math.sin(angle);
    angle += a;
    var x2 = 85+75*Math.cos(angle), y2 = 85+75*Math.sin(angle);
    var path;
    if (a >= 2*Math.PI - 0.001) {
      path = "M85,10 A75,75 0 1,1 84.999,10 Z";
    } else {
      path = "M85,85 L"+x1+","+y1+" A75,75 0 "+(a>Math.PI?1:0)+",1 "+x2+","+y2+" Z";
    }
    return {path:path, col:safeHex(d.cat.color, P.accent2), label:d.cat.nombre, value:d.value};
  });
  var totalFmt = priv ? "•••" : sym+new Intl.NumberFormat("es-AR",{maximumFractionDigits:0}).format(total);
  return (
    <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
      <svg width="170" height="170" viewBox="0 0 170 170">
        {slices.map(function(s,i){return <path key={i} d={s.path} fill={s.col}/>;} )}
        <circle cx="85" cy="85" r="38" fill={P.bg2}/>
        <text x="85" y="81" textAnchor="middle" style={{fontSize:9,fill:P.textMuted}}>Total</text>
        <text x="85" y="95" textAnchor="middle" style={{fontSize:9,fill:P.text,fontWeight:500}}>{totalFmt}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
        {slices.map(function(s,i){
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:10,height:10,borderRadius:3,background:s.col,flexShrink:0}}/>
              <span style={{flex:1,fontSize:12,color:P.textSub}}>{s.label}</span>
              <span style={{fontSize:12,fontWeight:600,color:P.text}}>{Math.round(s.value/total*100)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  // DATA
  var now = new Date();
  var mesLabel = MESES[now.getMonth()]+" "+now.getFullYear();

  var mesActual = useMemo(function(){
    return movs.filter(function(m){
      var d=new Date(m.fecha);
      return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    });
  }, [movs]);

  var ingresos = mesActual.filter(function(m){return m.tipo==="ingreso";}).reduce(function(s,m){return s+Number(m.monto);},0);
  var egresos = mesActual.filter(function(m){return m.tipo==="egreso";}).reduce(function(s,m){return s+Number(m.monto);},0);
  var balance = ingresos - egresos;

  var pieData = useMemo(function(){
    var map={};
    mesActual.filter(function(m){return m.tipo==="egreso";}).forEach(function(m){
      map[m.cat_id]=(map[m.cat_id]||0)+Number(m.monto);
    });
    return Object.entries(map).map(function(entry){
      return {cat:getCat(+entry[0]),value:entry[1]};
    }).filter(function(d){return d.cat;}).sort(function(a,b){return b.value-a.value;});
  }, [mesActual,cats]);

  var barData = useMemo(function(){
    var map={};
    movs.forEach(function(m){
      var d=new Date(m.fecha);
      var k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      if(!map[k])map[k]={ing:0,eg:0};
      map[k][m.tipo==="ingreso"?"ing":"eg"]+=Number(m.monto);
    });
    return Object.entries(map).sort(function(a,b){return a[0].localeCompare(b[0]);}).slice(-5);
  }, [movs]);

  var filteredMovs = useMemo(function(){
    return movs.filter(function(m){
      if(filtros.cuenta&&m.cuenta!==filtros.cuenta)return false;
      if(filtros.tipo&&m.tipo!==filtros.tipo)return false;
      if(filtros.catId&&String(m.cat_id)!==filtros.catId)return false;
      if(filtros.mes){
        var parts=filtros.mes.split("-");
        var md=new Date(m.fecha);
        if(md.getFullYear()!==+parts[0]||md.getMonth()+1!==+parts[1])return false;
      }
      return true;
    });
  }, [movs,filtros]);

  var exportMeses=[];
  for(var ei=0;ei<12;ei++){
    var ed=new Date(now.getFullYear(),now.getMonth()-ei,1);
    exportMeses.push({val:ed.getFullYear()+"-"+String(ed.getMonth()+1).padStart(2,"0"),label:MESES[ed.getMonth()]+" "+ed.getFullYear()});
  }

  var NAV=[
    {id:"dashboard",icon:"__chart_bar__",label:"Resumen",color:P.accent3},
    {id:"nuevo",icon:"__circle_plus__",label:"Agregar",color:P.pink,highlight:true},
    {id:"lista",icon:"__history__",label:"Movimientos",color:"#818cf8"},
    {id:"categorias",icon:"__settings__",label:"Categorías",color:P.accent2},
    {id:"servicios",icon:"__plug_connected__",label:"Servicios",color:"#f472b6"},
    {id:"exportar",icon:"__download__",label:"Exportar",color:P.green,sidebarOnly:true},
  ];

  function navTo(id) { setView(id); setEditMovId(null); if(id==="lista") setFiltros({cuenta:"",tipo:"",catId:"",mes:""}); }

  if (booting) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:P.bg1,flexDirection:"column",gap:16}}>

  if (!user) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,background:P.bg1}}>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:28,justifyContent:"center"}}>
          <FFSLogo size={28} color={P.accent2}/>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:P.text}}>FloraFauna Finanzas</div>
            <div style={{fontSize:10,color:P.textMuted}}>Tu economía personal</div>
          </div>
        </div>

          })}
        </div>
        {authErr&&<div style={{background:"rgba(248,113,113,0.12)",border:"1px solid rgba(248,113,113,0.3)",color:P.red,borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:12}}>{authErr}</div>}
        {authMode==="register"&&(

            <label style={{display:"block",fontSize:11,color:P.textMuted,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>Nombre</label>
            <div style={{border:"1px solid "+P.border,borderRadius:10,overflow:"hidden",background:P.bg3}}>
              <input type="text" placeholder="Tu nombre..." value={authForm.nombre} onChange={function(e){setAuthForm(function(f){return Object.assign({},f,{nombre:e.target.value});});}} style={iS}/>
            </div>
          </div>
        )}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:P.textMuted,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>Email</label>
          <div style={{border:"1px solid "+P.border,borderRadius:10,overflow:"hidden",background:P.bg3}}>
            <input type="email" placeholder="tu@email.com" value={authForm.email} onChange={function(e){setAuthForm(function(f){return Object.assign({},f,{email:e.target.value});});}} onKeyDown={function(e){if(e.key==="Enter")doAuth();}} style={iS}/>
          </div>
        </div>
        <div style={{marginBottom:20}}>

    </div>

        <div style={{marginBottom:14}}>
          <label style={labelStyle}>Nombre del perfil</label>

            <input type="text" value={editProfileForm.nombre} onChange={function(e){setEditProfileForm(function(f){return Object.assign({},f,{nombre:e.target.value});});}} style={iS}/>

        </div>
        <p style={{fontSize:10,color:P.textMuted,margin:"0 0 6px",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Color</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>

              <button onClick={function(){setShowNewProfile(false);}} style={{padding:"10px 14px",border:"1px solid "+P.border,borderRadius:10,cursor:"pointer",fontSize:13,background:P.bg3,color:P.textSub}}>Cancelar</button>
            </div>
          </div>
        ):(
          <button onClick={function(){setShowNewProfile(true);}} style={{width:"100%",padding:"11px",border:"1.5px dashed "+P.border,borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:600,background:"transparent",color:P.textMuted,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Ico icon="__circle_plus__" size={15} color={P.textMuted}/>Agregar perfil
          </button>

      </Modal>

      <div className="app-wrap" style={{display:"flex",maxWidth:1200,margin:"0 auto"}}>

        {/* SIDEBAR */}
        <nav className="app-sidebar" style={{display:"none",width:220,minHeight:"100vh",background:P.bg2,borderRight:"1px solid "+P.border,padding:"16px 12px",position:"sticky",top:0,height:"100vh",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,paddingBottom:14,borderBottom:"1px solid "+P.border}}>
            <FFSLogo size={20} color={P.accent2}/>
            <div><div style={{fontSize:11,fontWeight:700,color:P.text}}>FFS</div><div style={{fontSize:10,color:P.textMuted}}>{mesLabel}</div></div>
          </div>
          {NAV.map(function(t){
            if(t.highlight) return (
              <button key={t.id} onClick={function(){navTo(t.id);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:"none",borderRadius:10,cursor:"pointer",background:P.btnGrad,color:"#fff",fontSize:13,fontWeight:700,width:"100%",marginBottom:4,boxShadow:"0 2px 10px rgba(168,85,247,0.35)"}}>
                <Ico icon={t.icon} size={16} color="#fff"/>{t.label}
              </button>
            );
            return (
              <button key={t.id} onClick={function(){navTo(t.id);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:"none",borderRadius:10,cursor:"pointer",background:view===t.id?t.color+"20":"transparent",color:view===t.id?t.color:P.textMuted,fontSize:13,fontWeight:view===t.id?600:400,width:"100%",marginBottom:4,borderLeft:view===t.id?"3px solid "+t.color:"3px solid transparent"}}>
                <Ico icon={t.icon} size={16} color={view===t.id?t.color:P.textMuted}/>{t.label}
              </button>
            );
          })}
          <div style={{marginTop:"auto",paddingTop:12,borderTop:"1px solid "+P.border}}>
            <button onClick={function(){setShowProfilesPanel(true);}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:10,border:"1px solid "+P.border,background:P.bg3,cursor:"pointer",marginBottom:8,textAlign:"left"}}>
              <ProfileAvatar profile={profile} size={28}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:P.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile&&profile.nombre||"Perfil"}</div>
                <div style={{fontSize:10,color:P.textMuted}}>{profiles.length} perfil{profiles.length!==1?"es":""}</div>
              </div>
              <Ico icon="__switch__" size={13} color={P.textMuted}/>
            </button>
            <button onClick={openProfileEdit} style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"7px 10px",borderRadius:10,border:"1px solid "+P.border,background:"transparent",cursor:"pointer",marginBottom:8,color:P.textSub,fontSize:12}}>
              <Ico icon="__settings__" size={13} color={P.textMuted}/>Editar perfil
            </button>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <select value={monedaCode} onChange={async function(e){
                var nc=e.target.value; setMonedaCode(nc);
                var sess=getSess(); if(!sess||!activeProfileKey) return;
                await supa("/rest/v1/profiles?user_id=eq."+user.id+"&profile_key=eq."+activeProfileKey,{method:"PATCH",body:JSON.stringify({moneda_code:nc,updated_at:new Date().toISOString()})},sess.access_token).catch(function(){});
              }} style={{flex:1,background:P.bg3,border:"1px solid "+P.border,borderRadius:8,padding:"6px 8px",color:P.text,fontSize:12,outline:"none",cursor:"pointer"}}>
                {monedas.map(function(m){return <option key={m.code} value={m.code}>{m.code} {m.symbol}</option>;})}
              </select>
              <button onClick={function(){setPrivacyMode(function(v){return !v;});}} style={{width:32,height:32,borderRadius:8,border:"1px solid "+P.border,background:privacyMode?"rgba(232,121,249,0.15)":P.bg3,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Ico icon={privacyMode?"__eye_off__":"__eye__"} size={14} color={privacyMode?P.pink:P.textMuted}/>
              </button>
            </div>
            <button onClick={doLogout} style={{width:"100%",padding:"8px",border:"1px solid rgba(248,113,113,0.3)",borderRadius:10,background:"rgba(248,113,113,0.08)",color:P.red,fontSize:12,cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Ico icon="__logout__" size={13} color={P.red}/>Cerrar sesión
            </button>

        {/* MAIN */}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,position:"relative"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <FFSLogo size={20} color="rgba(255,255,255,0.7)"/>
                <div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:"0.1em"}}>FLORAFAUNA FINANZAS</div>

                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={function(){setShowProfilesPanel(true);}} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",padding:"5px 9px",borderRadius:20,cursor:"pointer"}}>
                  <ProfileAvatar profile={profile} size={18}/>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.85)",fontWeight:600,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile&&profile.nombre||"Perfil"}</span>
                </button>

                <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                  <select value={monedaCode} onChange={async function(e){
        var nc=e.target.value; setMonedaCode(nc);
        var sess=getSess(); if(!sess||!activeProfileKey) return;
        await supa("/rest/v1/profiles?user_id=eq."+user.id+"&profile_key=eq."+activeProfileKey,{method:"PATCH",body:JSON.stringify({moneda_code:nc,updated_at:new Date().toISOString()})},sess.access_token).catch(function(){});

                  <button onClick={doLogout} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.7)",fontSize:11,padding:"4px 9px",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:600}}>
                    <Ico icon="__logout__" size={11} color="rgba(255,255,255,0.7)"/>{user&&user.email&&user.email.split("@")[0]}

              </button>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:12,padding:"11px 14px"}}>
                <p style={{fontSize:10,color:"rgba(52,211,153,0.6)",margin:"0 0 3px",fontWeight:700,letterSpacing:"0.06em"}}>INGRESOS</p>
                <p style={{fontSize:17,fontWeight:700,color:P.green,margin:0}}>{fmtP(ingresos,sym)}</p>

              <div style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:12,padding:"11px 14px"}}>

                    var k=entry[0], v=entry[1];

            return (
              <button key={t.id} onClick={function(){navTo(t.id);}} style={{flex:1,padding:"7px 2px",border:"2px solid "+(active?t.color:P.border),borderRadius:11,cursor:"pointer",background:active?t.color+"18":P.bg2,color:active?t.color:P.textMuted,fontSize:9,fontWeight:active?700:500,letterSpacing:"0.04em",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <Ico icon={t.icon} size={16} color={active?t.color:P.textMuted}/>{t.label.toUpperCase()}
              </button>
            );
          })}
        </div>

      </div>{/* /app-wrap */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
